name: deploy
on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      versionPart:
        description: 'Version bump part'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major


jobs:
  TestBuildUploadArtifact:
    uses: idjaw/edunet/.github/workflows/python-app@main
    secrets: inherit

  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download distributable package
        uses: actions/download-artifact@v4
        with:
          name: distributable-package
          path: dist

      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

#      - name: Version bump on release branch
#        uses: bulv1ne/poetry-bumpversion/.github/workflows/version-bump.yml@main
#        with:
#          versionPart: ${{ inputs.versionPart }}

  #      - name: Publish the package with poetry
  #        env:
  #          API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
  #        run: |
  #          poetry config pypi-token.pypi "$API_TOKEN"
  #          poetry publish

      - name: Get version
        run: |
          echo "version=$(poetry version -s)" >> $GITHUB_ENV
        id: version

